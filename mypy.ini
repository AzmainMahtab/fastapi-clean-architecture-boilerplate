[mypy]
python_version = 3.14
warn_unused_configs = True

# —– Strictness —–
disallow_any_unimported = False
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = True
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True
strict_concatenate = True
strict_equality = True
strict_optional = True

# —– Plugins —–
plugins = sqlalchemy.ext.mypy.plugin

# —– Module‑level overrides —–

# SQLAlchemy Mapped[DateTime] vs runtime `datetime` is a known false positive
[mypy-app.modules.user.infrastructure.persistence.mapper]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Alembic migration files use the older `sa.text()` / raw‑string style
[mypy-alembic.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Core exception handler signatures are annotated with broad `Exception`
[mypy-app.core.exception_handlers]
disallow_untyped_defs = False

# Tests don't need strict annotation requirements
[mypy-app.*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
